services:
  postgres:
    image: postgres:16
    container_name: notebooklm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: notebooklm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-notebooklm}
      POSTGRES_DB: notebooklm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notebooklm -d notebooklm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: notebooklm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: notebooklm-milvus-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 15s
      timeout: 10s
      retries: 10

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: notebooklm-milvus-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 10

  milvus-standalone:
    image: milvusdb/milvus:v2.4.13
    container_name: notebooklm-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    ports:
      - "19530:19530"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 10

  backend:
    build:
      context: ../
      dockerfile: Dockerfile.backend
    container_name: notebooklm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://notebooklm:${POSTGRES_PASSWORD:-notebooklm}@postgres:5432/notebooklm
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus-standalone:19530
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENVIRONMENT: production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../outputs:/app/outputs
      - ../data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/api/v1/health",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rq-worker:
    build:
      context: ../
      dockerfile: Dockerfile.backend
    container_name: notebooklm-rq-worker
    restart: unless-stopped
    command:
      ["rq", "worker", "notebooklm-default", "--url", "redis://redis:6379/0"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://notebooklm:${POSTGRES_PASSWORD:-notebooklm}@postgres:5432/notebooklm
      REDIS_URL: redis://redis:6379/0
      MILVUS_URI: http://milvus-standalone:19530
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../outputs:/app/outputs
      - ../data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tr '\\0' ' ' </proc/1/cmdline | grep -q 'rq worker notebooklm-default'"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ../
      dockerfile: Dockerfile.frontend
    container_name: notebooklm-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  milvus_data:
