name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: uv run ruff check .

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: uv run pytest -q --tb=short

  frontend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: src/frontend-web/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f Dockerfile.backend -t notebooklm-backend:ci .
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t notebooklm-frontend:ci .
      - name: Verify backend healthcheck binary
        run: docker run --rm notebooklm-backend:ci which curl

  security-scan:
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install pip-audit
      - run: pip install uv && uv export --no-hashes > /tmp/requirements.txt
      - run: pip-audit -r /tmp/requirements.txt --ignore-vuln PYSEC-2024-* || true
